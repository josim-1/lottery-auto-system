name: Lottery Auto System

on:
  schedule:
    # Notifications - India time
    - cron: '0 13 * * *'   # 1:00 PM
    - cron: '10 13 * * *'  # 1:10 PM

    - cron: '0 18 * * *'   # 6:00 PM
    - cron: '10 18 * * *'  # 6:10 PM

    - cron: '0 20 * * *'   # 8:00 PM
    - cron: '10 20 * * *'  # 8:10 PM

    # Firebase upload - India time
    - cron: '20 13 * * *'  # 1:20 PM
    - cron: '20 18 * * *'  # 6:20 PM
    - cron: '20 20 * * *'  # 8:20 PM

  workflow_dispatch:
    inputs:
      action_name:
        description: "Manual action"
        required: true
        default: "notify_1pm_live"
        type: choice
        options:
          - notify_1pm_live
          - notify_1pm_result
          - notify_6pm_live
          - notify_6pm_result
          - notify_8pm_live
          - notify_8pm_result
          - save_1pm
          - save_6pm
          - save_8pm
          - cleanup_old_dates

jobs:
  auto-run:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install requests google-auth

      - name: Run automation
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          FIREBASE_AUTH: ${{ secrets.FIREBASE_AUTH }}
          FCM_TOPIC: ${{ secrets.FCM_TOPIC }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
          MANUAL_ACTION_NAME: ${{ github.event.inputs.action_name }}
        run: |
          python - << 'PY'
          import os
          import json
          import requests
          import datetime
          import urllib.parse

          from google.oauth2 import service_account
          from google.auth.transport.requests import Request

          project_id = os.environ["FIREBASE_PROJECT_ID"]
          service_account_json = os.environ["FIREBASE_SERVICE_ACCOUNT"]
          db_url = os.environ["FIREBASE_DB_URL"].rstrip("/")
          db_auth = os.environ.get("FIREBASE_AUTH", "").strip()
          fcm_topic = os.environ.get("FCM_TOPIC", "all").strip() or "all"

          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          event_schedule = os.environ.get("GITHUB_EVENT_SCHEDULE", "")
          manual_action = os.environ.get("MANUAL_ACTION_NAME", "")

          creds_info = json.loads(service_account_json)
          creds = service_account.Credentials.from_service_account_info(
              creds_info,
              scopes=["https://www.googleapis.com/auth/firebase.messaging"]
          )
          creds.refresh(Request())
          access_token = creds.token

          ist = datetime.timezone(datetime.timedelta(hours=5, minutes=30))
          now_ist = datetime.datetime.now(ist)
          today_date = now_ist.strftime("%Y-%m-%d")

          def auth_db_url(url):
              if db_auth:
                  sep = "&" if "?" in url else "?"
                  return f"{url}{sep}auth={urllib.parse.quote(db_auth)}"
              return url

          def send_notification(draw_time, title, body, extra="second", image=""):
              url = f"https://fcm.googleapis.com/v1/projects/{project_id}/messages:send"
              headers = {
                  "Authorization": f"Bearer {access_token}",
                  "Content-Type": "application/json; charset=UTF-8"
              }

              payload = {
                  "message": {
                      "topic": fcm_topic,
                      "data": {
                          "title": title,
                          "body": body,
                          "image": image,
                          "extra": extra,
                          "time": draw_time,
                          "date": today_date
                      },
                      "android": {
                          "priority": "HIGH"
                      }
                  }
              }

              r = requests.post(url, headers=headers, json=payload, timeout=30)
              print("FCM status:", r.status_code)
              print("FCM body:", r.text)
              r.raise_for_status()

          def firebase_get(path):
              url = auth_db_url(f"{db_url}{path}.json")
              r = requests.get(url, timeout=30)
              print("GET", path, r.status_code)
              r.raise_for_status()
              if r.text == "null":
                  return None
              return r.json()

          def firebase_put(path, data):
              url = auth_db_url(f"{db_url}{path}.json")
              r = requests.put(url, json=data, timeout=30)
              print("PUT", path, r.status_code, r.text)
              r.raise_for_status()

          def firebase_delete(path):
              url = auth_db_url(f"{db_url}{path}.json")
              r = requests.delete(url, timeout=30)
              print("DELETE", path, r.status_code, r.text)
              r.raise_for_status()

          def cleanup_keep_latest_30_dates():
              results = firebase_get("/FirebaseDB/results")
              if not results or not isinstance(results, dict):
                  print("No results data found for cleanup.")
                  return

              valid_dates = []
              for key in results.keys():
                  try:
                      datetime.datetime.strptime(key, "%Y-%m-%d")
                      valid_dates.append(key)
                  except Exception:
                      print("Skip non-date key:", key)

              valid_dates.sort()

              if len(valid_dates) <= 30:
                  print("30 or fewer dates found. No cleanup needed.")
                  return

              dates_to_delete = valid_dates[:-30]
              print("Deleting old dates:", dates_to_delete)

              for date_key in dates_to_delete:
                  firebase_delete(f"/FirebaseDB/results/{date_key}")

          def save_result(draw_time):
              api_url = f"https://indialotteryapi.com/wp-json/dearlottery/v1/by-date?date={today_date}&time={draw_time}&fallback=1"
              print("Fetching API:", api_url)

              r = requests.get(api_url, timeout=30)
              print("API status:", r.status_code)
              print("API body:", r.text[:1000])
              r.raise_for_status()

              obj = r.json()
              draw_no = obj.get("no", "")
              prizes = obj.get("prizes", {}) or {}

              if not draw_no:
                  print("draw_no empty. No save.")
                  return

              data_map = {
                  "draw_no": draw_no,
                  "date": today_date,
                  "time": draw_time,
                  "prizes": {
                      "1st": json.dumps(prizes.get("1st", []), ensure_ascii=False),
                      "cons": json.dumps(prizes.get("cons", []), ensure_ascii=False),
                      "2nd": json.dumps(prizes.get("2nd", []), ensure_ascii=False),
                      "3rd": json.dumps(prizes.get("3rd", []), ensure_ascii=False),
                      "4th": json.dumps(prizes.get("4th", []), ensure_ascii=False),
                      "5th": json.dumps(prizes.get("5th", []), ensure_ascii=False)
                  },
                  "saved_at": int(now_ist.timestamp() * 1000)
              }

              firebase_put(f"/FirebaseDB/results/{today_date}/{draw_time}", data_map)

              if draw_time == "8pm":
                  cleanup_keep_latest_30_dates()

          def choose_action():
              if event_name == "workflow_dispatch":
                  return manual_action

              schedule_map = {
                  "0 13 * * *": "notify_1pm_live",
                  "10 13 * * *": "notify_1pm_result",
                  "20 13 * * *": "save_1pm",

                  "0 18 * * *": "notify_6pm_live",
                  "10 18 * * *": "notify_6pm_result",
                  "20 18 * * *": "save_6pm",

                  "0 20 * * *": "notify_8pm_live",
                  "10 20 * * *": "notify_8pm_result",
                  "20 20 * * *": "save_8pm"
              }
              return schedule_map.get(event_schedule, "")

          action = choose_action()
          print("Selected action:", action)
          print("Today date:", today_date)

          if action == "notify_1pm_live":
              send_notification(
                  "1pm",
                  "1pm Live result available | ১টার লাইভ রেজাল্ট উপলব্ধ",
                  "1pm Live result available | ১টার লাইভ রেজাল্ট উপলব্ধ"
              )
          elif action == "notify_1pm_result":
              send_notification(
                  "1pm",
                  "1pm Result available | ১টার রেজাল্ট উপলব্ধ",
                  "1pm Result available | ১টার রেজাল্ট উপলব্ধ"
              )

          elif action == "notify_6pm_live":
              send_notification(
                  "6pm",
                  "6pm Live result available | ৬টার লাইভ রেজাল্ট উপলব্ধ",
                  "6pm Live result available | ৬টার লাইভ রেজাল্ট উপলব্ধ"
              )
          elif action == "notify_6pm_result":
              send_notification(
                  "6pm",
                  "6pm Result available | ৬টার রেজাল্ট উপলব্ধ",
                  "6pm Result available | ৬টার রেজাল্ট উপলব্ধ"
              )

          elif action == "notify_8pm_live":
              send_notification(
                  "8pm",
                  "8pm Live result available | ৮টার লাইভ রেজাল্ট উপলব্ধ",
                  "8pm Live result available | ৮টার লাইভ রেজাল্ট উপলব্ধ"
              )
          elif action == "notify_8pm_result":
              send_notification(
                  "8pm",
                  "8pm Result available | ৮টার রেজাল্ট উপলব্ধ",
                  "8pm Result available | ৮টার রেজাল্ট উপলব্ধ"
              )

          elif action == "save_1pm":
              save_result("1pm")
          elif action == "save_6pm":
              save_result("6pm")
          elif action == "save_8pm":
              save_result("8pm")
          elif action == "cleanup_old_dates":
              cleanup_keep_latest_30_dates()
          else:
              print("No valid action selected.")
          PY
